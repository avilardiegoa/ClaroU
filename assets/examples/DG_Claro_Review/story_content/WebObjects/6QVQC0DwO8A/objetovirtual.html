<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Flipcard</title>
<style>
 html, body {
    box-shadow: none !important;
    border: none !important;
    background: transparent !important;
  }

  iframe,.flip-card, .flip-card-inner, .flip-card img {
    box-shadow: none !important;
  } 
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;       
    overflow: hidden;     
  }

  .flip-card {
    width: 289px;
    height: 356px;
    perspective: 1000px;
    cursor: pointer;
    margin: 0 auto;
    opacity: 0; 
    overflow: hidden;
    background: transparent;
   
  }


  @keyframes entrance-scale {
    0%   { transform: scale(0.5); opacity: 0; }
    70%  { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }


  @keyframes wobble-tilt {
    0%   { transform: rotateZ(0deg); }
    25%  { transform: rotateZ(2deg); }
    50%  { transform: rotateZ(-2deg); }
    75%  { transform: rotateZ(1.5deg); }
    100% { transform: rotateZ(0deg); }
  }

  .flip-card.entering {
    animation: 
      entrance-scale 0.8s cubic-bezier(.68,-0.55,.27,1.55) 0.3s forwards,
      wobble-tilt 0.6s ease-in-out 1.2s;
  }

  .flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.68,-0.55,.27,1.55);
    transform: rotateY(0deg);
  }

  .flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
  }

  .flip-card-front, .flip-card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: transparent; 
  }

  .flip-card-back {
    transform: rotateY(180deg);
  }

  .flip-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;  
    display: block;
  }
    
</style>
</head>
<body>

<div class="flip-card" id="flip">
  <div class="flip-card-inner">
    <div class="flip-card-front">
      <img src="img/frente.png" alt="Frente">
    </div>
    <div class="flip-card-back">
      <img src="img/reverse.png" alt="Reverso">
    </div>
  </div>
</div>

<script>
(function () {
  const card  = document.getElementById('flip');
  const imgs  = card.querySelectorAll('img');

  function startEntrance() {
    card.classList.add('entering');
  }


  let remaining = imgs.length;
  function done() {
    remaining--;
    if (remaining <= 0) startEntrance();
  }
  imgs.forEach(img => {
    if (img.complete) { done(); }
    else {
      img.addEventListener('load',  done, { once: true });
      img.addEventListener('error', done, { once: true });
    }
  });

  setTimeout(() => { if (remaining > 0) startEntrance(); }, 500);


  card.addEventListener('click', () => {
    card.classList.toggle('flipped');
  });
})();
</script>

</body>
</html>
